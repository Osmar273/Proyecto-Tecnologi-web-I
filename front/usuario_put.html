<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Usuario - SEI</title>
    <style>
        :root {
            --azul-oscuro: #0e305a;
            --azul-claro: #0077b6;
            --naranja: #f26522;
            --fondo: #f4f7f9;
            --texto: #333333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        h1 {
            color: var(--azul-oscuro);
            border-bottom: 3px solid var(--naranja);
            padding-bottom: 10px;
            display: inline-block;
        }
        form {
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            border-top: 6px solid var(--azul-claro);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            color: var(--azul-oscuro);
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 90%;
            text-align: center;
        }
        button {
            background-color: var(--naranja);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 90%;
        }
        button:hover {
            background-color: #d1551c;
        }
    </style>
</head>
<body>
    <h1>Actualizar Usuario Existente</h1>
    <form id="formPut">
        <label>ID del Usuario a modificar:</label>
        <input type="number" id="id_usuario_put" required>

        <label>Nombre Completo:</label>
        <input type="text" id="nombre_put" required>

        <label>Correo Electrónico:</label>
        <input type="email" id="correo_put" required>

        <label>Contraseña:</label>
        <input type="password" id="contrasena_put" required>

        <label>Rol:</label>
        <select id="rol_put" required>
            <option value="Administrador">Administrador</option>
            <option value="Ingeniero">Ingeniero</option>
            <option value="Técnico">Técnico</option>
        </select>

        <label>Especialidad:</label>
        <input type="text" id="especialidad_put">

        <button type="submit">Actualizar Usuario</button>
    </form>
    <script src="usuario_put.js"></script>
</body>
</html>
