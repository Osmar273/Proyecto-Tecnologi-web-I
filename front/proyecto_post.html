<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Proyecto - SEI</title>
    <style>
        :root {
            --azul-oscuro: #0e305a;
            --azul-claro: #0077b6;
            --naranja: #f26522;
            --fondo: #f4f7f9;
            --texto: #333333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            padding: 20px;
            /* Añadido para centrar */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        h1 {
            color: var(--azul-oscuro);
            border-bottom: 3px solid var(--naranja);
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px; /* Para alinear con el formulario */
            margin-bottom: 20px;
        }
        form {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            border-left: 6px solid var(--azul-claro);
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%; /* Para que ocupe todo el ancho hasta max-width */
            box-sizing: border-box;
        }
        label {
            font-weight: bold;
            color: var(--azul-oscuro);
        }
        input, select, textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%; /* Para que ocupen todo el ancho del form */
            box-sizing: border-box;
        }
        button {
            background-color: var(--naranja);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #d1551c;
        }
    </style>
</head>
<body>
    <h1>Registrar Nuevo Proyecto</h1>
    <form id="formPost">
        <label>Nombre del Proyecto:</label>
        <input type="text" id="nombre_proyecto" required>

        <label>Descripción:</label>
        <textarea id="descripcion" required></textarea>

        <label>Fecha de Inicio:</label>
        <input type="date" id="fecha_inicio" required>

        <label>Estado:</label>
        <select id="estado" required>
            <option value="En proceso">En proceso</option>
            <option value="Completado">Completado</option>
        </select>

        <label>Presupuesto Total (Bs):</label>
        <input type="number" step="0.01" id="presupuesto_total" required>

        <label>Fecha de Presupuesto:</label>
        <input type="date" id="fecha_presupuesto" required>

        <label>Estado del Presupuesto:</label>
        <select id="estado_presupuesto" required>
            <option value="Aprobado">Aprobado</option>
            <option value="Pagado">Pagado</option>
            <option value="Pendiente">Pendiente</option>
        </select>

        <label>ID Cliente:</label>
        <input type="number" id="id_cliente" required>

        <label>ID Usuario (Responsable):</label>
        <input type="number" id="id_usuario" required>

        <button type="submit">Guardar Proyecto</button>
    </form>
    <script src="proyecto_post.js"></script>
</body>
</html>
