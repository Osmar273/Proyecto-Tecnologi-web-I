<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Datos Personales - SEI</title>
    <style>
        :root {
            --azul-oscuro: #0e305a;
            --azul-claro: #0077b6;
            --naranja: #f26522;
            --fondo: #f4f7f9;
            --texto: #333333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        h1 {
            color: var(--azul-oscuro);
            border-bottom: 3px solid var(--naranja);
            padding-bottom: 10px;
            display: inline-block;
        }
        form {
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            border-top: 6px solid var(--azul-claro);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            color: var(--azul-oscuro);
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 90%;
            text-align: center;
        }
        button {
            background-color: var(--naranja);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 90%;
        }
        button:hover {
            background-color: #d1551c;
        }
        .btn-volver {
    background-color: white;
    color: var(--azul-oscuro);
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    border: 2px solid var(--naranja);
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-weight: bold;
}

.btn-volver:hover {
    background-color: var(--naranja);
    color: white;
}
    </style>
</head>
<body>
    <h1>Registrar Datos Personales</h1>
    <form id="formPost">
        <label>ID Usuario (Vinculación):</label>
        <input type="number" id="id_usuario" required>

        <label>Carnet de Identidad (CI):</label>
        <input type="text" id="ci" required>

        <label>Apellido Paterno:</label>
        <input type="text" id="ap_paterno">

        <label>Apellido Materno:</label>
        <input type="text" id="ap_materno">

        <label>Fecha de Nacimiento:</label>
        <input type="date" id="fecha_nac">

        <label>Dirección:</label>
        <input type="text" id="direccion">

        <label>Teléfono:</label>
        <input type="text" id="telefono">

        <button type="submit">Guardar Datos Personales</button>
    </form>
    <script src="persona_post.js"></script>
    <script src="usuario_put.js"></script>
    <a id="btnVolver" href="#" class="btn-volver" onclick="volverDashboard(); return false;">
    <i class="fas fa-arrow-left"></i> Volver</a>

<script>
    function volverDashboard() {
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (usuario && usuario.rol === 'Técnico') {
            window.location.href = 'panel_tecnico.html';
        } else {
            window.location.href = 'index.html';
        }
    }
</script>
</body>
</html>
