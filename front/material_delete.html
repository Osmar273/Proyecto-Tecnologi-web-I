<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Material - SEI</title>
    <style>
        :root {
            --azul-oscuro: #0e305a;
            --azul-claro: #0077b6;
            --naranja: #f26522;
            --fondo: #f4f7f9;
            --texto: #333333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        h1 {
            color: #d9534f;
            border-bottom: 3px solid var(--azul-oscuro);
            padding-bottom: 10px;
            display: inline-block;
        }
        form {
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            border-top: 6px solid #d9534f;
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            color: var(--azul-oscuro);
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 90%;
            text-align: center;
        }
        button {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 90%;
        }
        button:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>
    <h1>Eliminar Material</h1>
    <form id="formDelete">
        <label>ID del Material a eliminar:</label>
        <input type="number" id="id_material_delete" required>
        <button type="submit">Eliminar Definitivamente</button>
    </form>
    <script src="material_delete.js"></script>
</body>
</html>
