<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Proyecto - SEI</title>
    <style>
        :root {
            --azul-oscuro: #0e305a;
            --azul-claro: #0077b6;
            --naranja: #f26522;
            --fondo: #f4f7f9;
            --texto: #333333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        h1 {
            color: var(--azul-oscuro);
            border-bottom: 3px solid var(--naranja);
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        form {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            border-left: 6px solid var(--azul-claro);
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        label {
            font-weight: bold;
            color: var(--azul-oscuro);
        }
        input, select, textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: var(--naranja);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #d1551c;
        }
        .btn-volver {
    background-color: white;
    color: var(--azul-oscuro);
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    border: 2px solid var(--naranja);
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-weight: bold;
}

.btn-volver:hover {
    background-color: var(--naranja);
    color: white;
}
    </style>
</head>
<body>
    <h1>Actualizar Proyecto Existente</h1>
    <form id="formPut">
        <label>ID del Proyecto a modificar:</label>
        <input type="number" id="id_proyecto_put" required>

        <label>Nombre del Proyecto:</label>
        <input type="text" id="nombre_proyecto_put" required>

        <label>Descripción:</label>
        <textarea id="descripcion_put" required></textarea>

        <label>Fecha de Inicio:</label>
        <input type="date" id="fecha_inicio_put" required>

        <label>Estado:</label>
        <select id="estado_put" required>
            <option value="En proceso">En proceso</option>
            <option value="Completado">Completado</option>
        </select>

        <label>Presupuesto Total (Bs):</label>
        <input type="number" step="0.01" id="presupuesto_total_put" required>

        <label>Fecha de Presupuesto:</label>
        <input type="date" id="fecha_presupuesto_put" required>

        <label>Estado del Presupuesto:</label>
        <select id="estado_presupuesto_put" required>
            <option value="Aprobado">Aprobado</option>
            <option value="Pagado">Pagado</option>
            <option value="Pendiente">Pendiente</option>
        </select>

        <label>ID Cliente:</label>
        <input type="number" id="id_cliente_put" required>

        <label>ID Usuario (Responsable):</label>
        <input type="number" id="id_usuario_put" required>

        <button type="submit">Actualizar Proyecto</button>
    </form>
    <script src="proyecto_put.js"></script>
    <script src="usuario_put.js"></script>
    <a id="btnVolver" href="#" class="btn-volver" onclick="volverDashboard(); return false;">
    <i class="fas fa-arrow-left"></i> Volver</a>

<script>
    function volverDashboard() {
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (usuario && usuario.rol === 'Técnico') {
            window.location.href = 'panel_tecnico.html';
        } else {
            window.location.href = 'index.html';
        }
    }
</script>
</body>
</html>
