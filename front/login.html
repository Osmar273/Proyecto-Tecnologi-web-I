<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEI - Sistema Eléctrico Industrial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0B2B4F;
            --primary-medium: #1E4A6F;
            --primary-light: #2F6B95;
            --accent-orange: #F15A24;
            --accent-orange-light: #FF7F4F;
            --accent-yellow: #FFB800;
            --text-light: #FFFFFF;
            --text-dark: #333333;
            --gray-light: #F5F7FA;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-medium) 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Elementos decorativos */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 8s ease-in-out infinite;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, var(--accent-orange-light) 0%, transparent 70%);
            opacity: 0.1;
        }

        .circle-2 {
            width: 400px;
            height: 400px;
            bottom: -200px;
            right: -200px;
            background: radial-gradient(circle, var(--accent-yellow) 0%, transparent 70%);
            opacity: 0.1;
            animation-delay: 2s;
        }

        .circle-3 {
            width: 200px;
            height: 200px;
            bottom: 100px;
            left: 100px;
            background: radial-gradient(circle, var(--primary-light) 0%, transparent 70%);
            opacity: 0.1;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(11, 43, 79, 0.3);
            width: 90%;
            max-width: 420px;
            padding: 40px;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            animation: slideUp 0.5s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-medium));
            border-radius: 15px;
            color: white;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .logo h1 span {
            color: var(--accent-orange);
        }

        .logo p {
            font-size: 14px;
            opacity: 0.9;
            color: var(--accent-yellow);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-dark);
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid var(--gray-light);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        .input-group input:focus {
            border-color: var(--accent-orange);
            outline: none;
            box-shadow: 0 0 0 3px rgba(241, 90, 36, 0.1);
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 45px;
            color: var(--primary-light);
            font-size: 20px;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--primary-medium);
            font-size: 14px;
        }

        .remember input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-orange);
        }

        .forgot-password {
            color: var(--accent-orange);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: var(--primary-dark);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-light) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(241, 90, 36, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(241, 90, 36, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            display: block;
            border-left: 4px solid #c33;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
            border-left: 4px solid #2e7d32;
        }

        .message.info {
            background: #e3f2fd;
            color: var(--primary-dark);
            display: block;
            border-left: 4px solid var(--primary-dark);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: var(--primary-light);
            font-size: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-light);
        }

        .demo-creds {
            background: var(--gray-light);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
        }

        .demo-creds p {
            margin: 3px 0;
        }

        .demo-creds strong {
            color: var(--accent-orange);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Elementos decorativos -->
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <div class="login-container">
        <div class="logo">
            <h1>SISTEMA <span>ELÉCTRICO</span></h1>
            <h1>INDUSTRIAL</h1>
            <p>SEI - Gestión de Proyectos</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="correo">Correo Electrónico</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="correo" placeholder="usuario@sei.com" required>
            </div>

            <div class="input-group">
                <label for="contrasena">Contraseña</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="contrasena" placeholder="••••••••" required>
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="recordar"> Recordarme
                </label>
                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                Iniciar Sesión
            </button>

            <div id="message" class="message"></div>

        </form>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
